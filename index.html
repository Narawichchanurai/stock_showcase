# AAPL — Apple Inc. Research Brief
_Generated: 2026-05-21_

---

## 1. Company Snapshot

Apple ออกแบบและขายสินค้าอิเล็กทรอนิกส์ (iPhone, Mac, iPad, Apple Watch, AirPods) และบริการดิจิทัล (App Store, iCloud, Apple Music, Apple TV+, Apple Pay) รายได้หลักยังมาจาก iPhone ประมาณ 46-48% ของยอดขายรวม แต่ฝั่ง Services กำลังโตเร็วที่สุดและมี margin สูงกว่ามาก บริษัทขายผ่านทั้งช่องทางตรง (Apple Store, Online) และ carrier + reseller ทั่วโลก ตลาดหลักคือ Americas ยุโรป และ Greater China โดย China คิดเป็น ~17-19% ของรายได้รวมและเป็นทั้ง upside และ risk ที่ต้องจับตา

---

## 2. Fundamentals Signal

- **Revenue scale:** Total net sales ~$391B ใน FY2025 — iPhone ยังใหญ่สุด (~46-48%) แต่ Services คือตัวที่โตเร็วและ margin ดีที่สุด (~74-76% gross margin vs Products ~37-39%)
- **Margin mix shift:** Blended gross margin แถว 46-47% และมีแนวโน้มขยายตาม Services mix ที่เพิ่ม แต่ memory cost headwind กำลังสวนทางในระยะสั้น
- **Capital allocation:** Buyback หนักที่สุดใน S&P 500 + dividend โต + ยกเลิก net cash neutral target อย่างเป็นทางการใน Q2 FY2026 — financial policy กำลังเปลี่ยน
- **R&D acceleration:** R&D scaling ขึ้น "significantly" YoY ในฝั่ง AI และ silicon — Process Power ที่กำลัง build ผ่าน Apple Intelligence และ in-house SoC
- **Key risks:** TSMC dependency สำหรับ advanced SoC + China revenue concentration ~17-19% + App Store regulatory pressure ใน EU/US ทั้งสามตัวนี้เป็น structural risk ที่ไม่หายในระยะสั้น

---

## 3. Latest Earnings — Q2 FY2026 (March Quarter)

- **Revenue $111.2B (+17% YoY) ทำ March record** — iPhone $57B (+22%), Services $31B (+16%), Mac $8.4B (+6%), iPad $6.9B (+8%), Wearables $7.9B (+5%)
- **Diluted EPS $2.10 (+22% YoY) ทำ March record** — Net income $29.6B; Operating cash flow $28.7B
- **Gross margin 49.3%** เหนือ guidance range — Services 76.7%, Products 38.7%
- **Guidance Q3 FY2026:** Revenue growth 14-17% YoY; Gross margin 47.5-48.5% — ลดจาก 49.3% เพราะ memory costs "significantly higher"
- **CEO transition:** Tim Cook ส่งไม้ให้ John Ternus มีผล 1 ก.ย. 2026; Greater China H1 FY2026 +33% YoY ทำ quarterly record

---

## 4. Bull Case / Bear Case

**Bull:**
- Services margin 74-76% โตต่อเนื่อง — ยิ่ง mix shift ไป Services ยิ่ง blended margin ขยาย earnings quality ดีขึ้นโดยไม่ต้องพึ่ง iPhone unit growth เพียงอย่างเดียว
- Apple Intelligence + in-house SoC คือ Switching Cost และ Process Power ที่ทำ ecosystem lock-in แข็งขึ้น — customer satisfaction iPhone 99% ใน US
- Greater China bounce กลับ +33% YoY ใน H1 FY2026 หลังจากที่เป็นจุดอ่อนมาหลายปี

**Bear:**
- Memory cost headwind "significantly higher" ใน June quarter — management ยังไม่ระบุว่าจะ pass through ให้ลูกค้าได้แค่ไหน
- CEO transition กลางปีเป็น execution risk — Ternus มาจากฝั่ง hardware engineering ไม่ใช่ operations/finance แบบ Cook
- App Store forced business model changes ใน EU + US ถ้า materialise กระทบ Services segment ที่ margin ดีที่สุด

---

## 5. Kill Conditions

- **Services gross margin ร่วงต่ำกว่า 72% สองไตรมาสติดกัน** — สัญญาณ regulatory หรือ competitive pressure เริ่ม eat into engine หลักของ thesis จริงๆ
- **Greater China revenue กลับมาติดลบ YoY อีกครั้ง** หลังที่เพิ่งกลับมา +33% — แปลว่า local competition (Huawei/Xiaomi) กินส่วนแบ่งถาวร
- **Ternus reverse หรือ pause buyback ใน 2 quarter แรกหลังรับตำแหน่ง** — สัญญาณที่ชัดที่สุดว่า capital allocation discipline เปลี่ยนทิศจาก Cook era

---

## 6. What to Ask Before Owning It

1. ก่อนตลาดเปิด AAPL มีประวัติ price action แบบไหนหลัง earnings beat — มันมักพุ่งแล้วย่อกลับภายใน pre-market หรือ hold ขึ้นไปต่อหลัง open?
2. Memory cost headwind ที่ management บอก "significantly higher" จะ peak ไตรมาสไหน — มีสัญญาณ (TSMC pricing, DRAM spot price) อะไรที่บอกได้ว่า worst case ผ่านไปแล้ว?
3. CEO transition 1 ก.ย. 2026 — window ไหนก่อน/หลัง transition date ที่ price action มักผันผวน และ institutional money มักขยับตอนไหน?
4. Services growth 16% YoY มาจาก volume หรือ ARPU — ถ้ามาจาก price hike เพียงอย่างเดียวมันยั่งยืนแค่ไหนถ้า recession มา?
5. WWDC และ product launch cycle ช่วงไหนในปีนี้ที่มีโอกาสทำ pre-market spike สั้นๆ ที่คุ้มกับ risk/reward ของสไตล์ entry ก่อน open?

# NVDA — NVIDIA Corporation
**วันที่:** 2026-05-21

---

## 1. Company Snapshot

NVIDIA ออกแบบชิป GPU ที่กลายเป็นโครงสร้างพื้นฐานหลักของอุตสาหกรรม AI ทั่วโลก รายได้ส่วนใหญ่มาจากกลุ่ม Data Center ที่ขาย GPU ซีรีส์ H100/H200/Blackwell ให้บริษัทคลาวด์ยักษ์ใหญ่อย่าง Microsoft, Google, Amazon และ Meta รวมถึงประเทศต่างๆ ที่ลงทุน AI infrastructure ธุรกิจ Gaming ยังทำรายได้แต่สัดส่วนหดลงเรื่อยๆ บริษัทเป็นโมเดล fabless — ออกแบบชิปเองแต่ให้ TSMC เป็นผู้ผลิต

---

## 2. Fundamentals Signal

- **รายได้: ทิศทางขึ้นแรงมาก** — Data Center โตแบบก้าวกระโดดในช่วง FY2024-2025 ขับเคลื่อนโดย demand GPU สำหรับ AI training และ inference ที่ยังไม่มีสัญญาณชะลอ
- **Gross margin: ทรงตัวสูง** — สะท้อน pricing power และ product mix ที่หนักไปทาง Data Center; สูงผิดปกติสำหรับบริษัทฮาร์ดแวร์
- **งบดุล: แข็งแกร่ง** — เงินสดสูง หนี้อยู่ในระดับที่บริหารได้ สามารถ self-fund R&D ขนาดใหญ่ได้เอง
- **Capital allocation: buyback + R&D เข้ม** — คืนเงินผู้ถือหุ้นต่อเนื่อง พร้อมลงทุน R&D หนักเพื่อรักษา Switching Costs ผ่าน CUDA ecosystem
- **ความเสี่ยงหลัก** — รายได้กระจุกใน Data Center; ถ้า hyperscaler capex ชะลอหรือกฎส่งออกชิปไปจีนเปลี่ยน จะกระทบโดยตรงและเร็ว

---

## 3. Latest Earnings

ไม่มี earnings transcript ใน sources/NVDA/ — ต้องเพิ่ม source ก่อนแล้วรัน brief ใหม่

วิธีเพิ่ม: สร้าง folder sources/NVDA/ แล้วใส่ไฟล์ชื่อ pattern q*-YYYY-call.md เช่น q1-2026-call.md

---

## 4. Bull Case / Bear Case

**Bull:**
- NVIDIA มี Process Power จาก CUDA ecosystem ที่ developer และ researcher ทั่วโลกติดลึก — migration ออกมีต้นทุนสูงมาก ทำให้รายได้มีแรงยึด
- ทุก AI hyperscaler ยังอยู่ในช่วง capex expansion โดยเฉพาะ inference workload ที่เพิ่มตามการใช้งาน AI ใน production — demand cycle น่าจะยาวกว่า 1-2 ไตรมาส
- NVDA มีประวัติ pre-market volatility สูงในวัน earnings และวันที่มี catalyst ใหญ่ — เหมาะกับการจับรอบสั้นถ้าจับจังหวะ catalyst และ entry point ได้ถูก

**Bear:**
- AMD ไล่ตาม GPU architecture ขณะที่ Google (TPU), Amazon (Trainium), Meta (MTIA) ออกแบบชิป AI เองมากขึ้น — Switching Costs จาก CUDA อาจถูก erode ได้
- รายได้กระจุกใน Data Center มากเกินไป ถ้า capex cycle ของ hyperscaler หักหัวหรือ AI adoption ชะลอกว่าที่คาด กำไรจะหดหนักในไตรมาสเดียว
- ราคาหุ้น premium สูง — earnings miss เล็กน้อยหรือ guidance ต่ำกว่าคาดมักทำให้หุ้นดิ่งแรงก่อนตลาดเปิด

---

## 5. Kill Conditions

- **Guidance Data Center ลด QoQ สองไตรมาสติด** — สัญญาณแรกที่บอกว่า demand cycle AI หักหัวจริง; ออกทันที ไม่รอยืนยันไตรมาสที่สาม
- **Gross margin ลดลงต่อเนื่อง 3 ไตรมาส** — ถ้า margin กัดลงแสดงว่า pricing power เริ่มหาย หรือ competition เริ่มกิน share จริง
- **Hyperscaler top-3 ลด GPU order อย่างชัดเจน** — signal นี้มักออกก่อนตัวเลขทางการผ่าน supply chain news; ถ้าเห็น ให้ตัดก่อน official confirmation

---

## 6. What to Ask Before Owning It

1. **Catalyst ที่จะทำให้ pre-market พุ่งคืออะไร และอยู่ห่างกี่วัน?** — earnings date, product launch, หรือ hyperscaler capex announcement?
2. **ราคาปัจจุบันอยู่ตรงไหนเทียบกับ 52-week range และ recent support zone?** — NVDA dip และ spike รุนแรง รู้ว่า entry จุดไหนสมเหตุสมผลก่อนเข้า
3. **มี unusual options activity หรือ dark pool flow ก่อน event ไหม?** — สัญญาณ institutional positioning ที่อาจชี้ทิศทาง pre-market ได้ล่วงหน้า
4. **Export control ชิปไปจีนล่าสุดสถานะเป็นยังไง?** — กฎเปลี่ยนทีไร NVDA มักเด้งหรือดิ่งทันทีก่อนที่ retails จะตามทัน
5. **ไตรมาสที่แล้ว หุ้น react ยังไงในคืน earnings — gap up หรือ gap down และกลับมาที่เดิมเร็วแค่ไหน?**

# DXYZ — Destiny Tech100 Inc.
_Research summary only. Not investment advice._

---

## What the company does

Destiny Tech100 Inc. เป็น closed-end fund ที่จดทะเบียนซื้อขายในตลาดหลักทรัพย์ NYSE (IPO มีนาคม 2024) โดยให้นักลงทุนทั่วไปเข้าถึงหุ้นใน private tech unicorns ที่ยังไม่ IPO อย่าง SpaceX, OpenAI, Stripe, Chime และ Discord กองทุนนี้ถือครองสถานะในบริษัทเหล่านี้โดยตรง ทำให้ผู้ซื้อ DXYZ ได้ exposure กับ "pre-IPO tech giants" ผ่านตลาดสาธารณะ ซึ่งปกติเข้าถึงได้เฉพาะ VC และ institutional investor เท่านั้น

---

## Latest Earnings

> DXYZ เป็น closed-end fund ไม่มี earnings แบบบริษัทปกติ — ข้อมูลด้านล่างอ้างอิงจาก NAV/portfolio disclosure (training data cutoff สิงหาคม 2025)

- **NAV vs. Market Price:** DXYZ ซื้อขายที่ premium สูงมากเหนือ NAV จริง (บางช่วงทะลุ 100-200%+) ซึ่งหมายความว่าตลาดให้ราคาสูงกว่ามูลค่าทรัพย์สินในพอร์ตจริงๆ มาก
- **Top holdings:** SpaceX (สัดส่วนใหญ่สุด), OpenAI, Stripe, Chime, Discord — ล้วนเป็น unicorns ที่มูลค่า private market สูง
- **AUM** ของกองทุนค่อนข้างเล็กเมื่อเทียบกับ premium ที่ตลาดให้ — ทำให้ราคาหุ้นผันผวนสูงมาก
- กองทุนเพิ่งจดทะเบียนปี 2024 ข้อมูล track record ยังสั้น — ควรอ่าน prospectus โดยตรง

---

## Bull Case / Bear Case

### Bull Case
- **Access to unicorns:** เป็นวิธีเดียวที่นักลงทุนรายย่อยจะถือ SpaceX หรือ OpenAI ผ่านบัญชีซื้อขายปกติ — demand นี้เป็น structural
- **Potential IPO catalyst:** ถ้า SpaceX หรือ Stripe IPO มูลค่า NAV จะ re-rate ขึ้นมหาศาล ซึ่งอาจดัน share price ตาม
- **AI/Space tailwind:** portfolio concentrated ใน sectors ที่ตลาดให้ valuation พรีเมียมสูงในยุคนี้

### Bear Case

- **Threads + WhatsApp monetization ยังไม่เต็มที่:** 2 แพลตฟอร์มที่มี user base ใหญ่แต่ยังแทบไม่มีรายได้ — เป็น optionality ที่อาจ unlock ได้ในอีก 2-3 ปี

**Bear:**
- **Ad revenue concentrated เกินไปใน 1 model:** รายได้ ~97% มาจาก advertising — ถ้า macro ชะลอหนักหรือมี regulatory crackdown ทั้ง business โดนตรง
- **Capex spiral ที่ยังไม่ชัดว่า ROI จะมาเมื่อไหร่:** ถ้า AI ads ไม่ deliver return ที่ justify ขนาดการลงทุน นักลงทุนจะ re-rate margin กลับลง
- **EU Digital Markets Act + FTC antitrust:** ถ้า regulator สั่งให้แยก Instagram หรือ WhatsApp จะทำลาย cross-platform data loop ที่เป็นแก่นของ ad targeting advantage

---

### 5. Kill conditions

- **Ad revenue growth ติดลบ 2 quarter ติด** ในขณะที่คู่แข่ง (Google, TikTok) ไม่ได้โดนเหมือนกัน
- **Capex เพิ่มขึ้นแต่ operating margin หดลง 3 quarter ติด** — ถ้า investment ไม่ convert เป็น revenue growth จริง thesis เรื่อง AI monetization พัง
- **Regulatory ruling ที่บังคับ divestiture จริง** — คำสั่งให้แยก Instagram หรือ WhatsApp จะทำลาย cross-platform data advantage ซึ่งเป็น core ของ ad targeting

---

### 6. What to ask before owning it

1. **Earnings date ล่าสุดคือวันไหน และ stock เคยเคลื่อนแรงแค่ไหนหลัง earnings?** — สำหรับสไตล์ pre-market ต้องรู้ว่าจังหวะ spike มักเกิดตอนไหนและแรงแค่ไหน
2. **Capex guidance quarter ล่าสุดบอกเท่าไหร่ และ management พูดถึง AI ROI ยังไง?** — ถ้า capex ขึ้นแรงโดยไม่มี revenue ramp ที่ชัดเจน margin จะโดนกด
3. **TikTok situation ตอนนี้เป็นยังไง — กระทบ Reels ad spend จริงไหม?** — TikTok ban/unban เป็น catalyst ที่ volatile มาก และ direct ต่อ META
4. **ราคาตอนนี้ P/E เท่าไหร่ เทียบกับ forward growth rate แล้วสมเหตุสมผลไหม?** — หุ้น growth ที่แพงเกินไปลงได้แรงแม้ผลประกอบการดี โดยเฉพาะช่วง pre-market
5. **Reality Labs ขาดทุน trend กำลังดีขึ้นหรือแย่ลงใน quarter ล่าสุด?** — ถ้าขาดทุนพุ่งแบบ non-linear อาจเป็น negative catalyst ก่อนตลาดเปิด

  /* ---- Minimal markdown to HTML converter ---- */
  function mdToHtml(md) {
    const lines = md.split('\n');
    let html = '';
    let inList = false;
    let inBlockquote = false;

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function inline(text) {
      let s = esc(text);
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      s = s.replace(/(?<!\w)_([^_]+)_(?!\w)/g, '<em>$1</em>');
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return s;
    }

    for (const line of lines) {
      const t = line.trim();
      const isList  = /^[-*]\s/.test(t);
      const isBq    = /^>/.test(t);
      const isHr    = /^-{3,}$/.test(t);
      const isH3    = /^### /.test(t);
      const isH2    = /^## /.test(t);
      const isH1    = /^# /.test(t);

      if (!isList && inList)      { html += '</ul>';         inList = false; }
      if (!isBq  && inBlockquote) { html += '</blockquote>'; inBlockquote = false; }

      if (isH3)       { html += '<h3>' + inline(t.replace(/^### /, '')) + '</h3>'; }
      else if (isH2)  { html += '<h2>' + inline(t.replace(/^## /, '')) + '</h2>'; }
      else if (isH1)  { html += '<h1>' + inline(t.replace(/^# /, '')) + '</h1>'; }
      else if (isHr)  { html += '<hr>'; }
      else if (isBq)  {
        if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
        const c = t.replace(/^>\s?/, '');
        if (c) html += '<p>' + inline(c) + '</p>';
      }
      else if (isList) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inline(t.replace(/^[-*]\s+/, '')) + '</li>';
      }
      else if (t) { html += '<p>' + inline(line) + '</p>'; }
    }

    if (inList)       html += '</ul>';
    if (inBlockquote) html += '</blockquote>';
    return html;
  }

  /* ---- Render card grid ---- */
  const grid = document.getElementById('grid');
  BRIEFS.forEach(function(b) {
    const card = document.createElement('div');
    card.className = 'card';
    const verBadge = b.version

      : '';

      '<div class="card-preview">' + b.preview + '</div>';
    card.addEventListener('click', function() { openModal(b.id); });
    grid.appendChild(card);
  });

  /* ---- Modal logic ---- */
  const overlay      = document.getElementById('overlay');
  const briefContent = document.getElementById('briefContent');
  const closeBtn     = document.getElementById('closeBtn');

  function openModal(id) {
    const raw = document.getElementById('md-' + id).textContent;
    briefContent.innerHTML = mdToHtml(raw);
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    overlay.scrollTop = 0;
  }
  function closeModal() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
